name: PaySplit AI - Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run backend tests
        run: cd backend && python -m pytest tests/ -v --tb=short || echo "No tests found"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_BASE_URL: ""
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/paysplit-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/paysplit-backend:latest \
            ./backend
          docker push $ECR_REGISTRY/paysplit-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/paysplit-backend:latest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL="" \
            --build-arg VITE_GOOGLE_CLIENT_ID="$VITE_GOOGLE_CLIENT_ID" \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY="$VITE_STRIPE_PUBLISHABLE_KEY" \
            -t $ECR_REGISTRY/paysplit-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/paysplit-frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/paysplit-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/paysplit-frontend:latest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Register new backend task definition with env vars
        run: |
          aws ecs register-task-definition \
            --family paysplit-backend \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 512 \
            --memory 1024 \
            --execution-role-arn arn:aws:iam::963777256342:role/ecsTaskExecutionRole \
            --task-role-arn arn:aws:iam::963777256342:role/ecsTaskExecutionRole \
            --container-definitions "[{
              \"name\": \"paysplit-backend\",
              \"image\": \"963777256342.dkr.ecr.us-east-1.amazonaws.com/paysplit-backend:latest\",
              \"portMappings\": [{\"containerPort\": 8000, \"protocol\": \"tcp\"}],
              \"essential\": true,
              \"environment\": [
                {\"name\": \"SECRET_KEY\", \"value\": \"$SECRET_KEY\"},
                {\"name\": \"DATABASE_URL\", \"value\": \"$DATABASE_URL\"},
                {\"name\": \"STRIPE_SECRET_KEY\", \"value\": \"$STRIPE_SECRET_KEY\"},
                {\"name\": \"PLAID_CLIENT_ID\", \"value\": \"$PLAID_CLIENT_ID\"},
                {\"name\": \"PLAID_SECRET\", \"value\": \"$PLAID_SECRET\"},
                {\"name\": \"PLAID_ENV\", \"value\": \"sandbox\"},
                {\"name\": \"FRONTEND_URL\", \"value\": \"https://www.paysplit.in\"},
                {\"name\": \"CORS_ORIGINS\", \"value\": \"https://www.paysplit.in,https://paysplit.in\"},
                {\"name\": \"GOOGLE_REDIRECT_URI\", \"value\": \"https://www.paysplit.in/api/auth/google/callback\"}
              ],
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"/ecs/paysplit-backend\",
                  \"awslogs-region\": \"us-east-1\",
                  \"awslogs-stream-prefix\": \"ecs\",
                  \"awslogs-create-group\": \"true\"
                }
              }
            }]" \
            --region us-east-1
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster paysplit-cluster \
            --service paysplit-backend \
            --task-definition paysplit-backend \
            --force-new-deployment \
            --region us-east-1

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster paysplit-cluster \
            --service paysplit-frontend \
            --force-new-deployment \
            --region us-east-1

      - name: Done
        run: echo "✅ Deployment triggered — paysplit.in updating now!"