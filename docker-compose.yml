version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paysplit-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./paysplit.db}
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_ISSUING_WEBHOOK_SECRET=${STRIPE_ISSUING_WEBHOOK_SECRET}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=${PLAID_ENV:-sandbox}
      - FRAUD_THRESHOLD=${FRAUD_THRESHOLD:-0.93}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:80}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:80,http://localhost:5173}
      - KMP_DUPLICATE_LIB_OK=TRUE
    volumes:
      - ./backend/paysplit.db:/app/paysplit.db
      - ./ml:/app/../ml
    networks:
      - paysplit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
        - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY}
    container_name: paysplit-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - paysplit-network

networks:
  paysplit-network:
    driver: bridge
