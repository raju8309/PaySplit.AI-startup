services:
  - type: web
    name: paysplit-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paysplit-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_ISSUING_WEBHOOK_SECRET
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: FRAUD_THRESHOLD
        value: "0.7"
      - key: FRONTEND_URL
        value: https://www.paysplit.in
      - key: CORS_ORIGINS
        value: https://www.paysplit.in

databases:
  - name: paysplit-db
    databaseName: paysplit
    user: paysplit
    plan: free
